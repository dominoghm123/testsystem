<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo V3 · 讲义编辑版</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%233f5c4f'/%3E%3Cpath d='M16 32h32' stroke='%23ffffff' stroke-width='5'/%3E%3Cpath d='M28 20v24' stroke='%23ffffff' stroke-width='5'/%3E%3C/svg%3E" />
    <style>
      :root {
        --bg: #f5f1e8;
        --paper: #fffdf8;
        --ink: #1d2530;
        --muted: #66707c;
        --line: #d5cec0;
        --olive: #3f5c4f;
        --olive-soft: #e8f0ec;
        --red: #a45140;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(180deg, #faf8f1, #f2ecdf),
          repeating-linear-gradient(0deg, rgba(29, 37, 48, 0.03) 0 1px, transparent 1px 32px);
        color: var(--ink);
        font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
        padding: 20px;
      }

      .frame {
        max-width: 1260px;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--paper);
        overflow: hidden;
      }

      .mast {
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(145deg, #fffefb, #f7f2e8);
        display: grid;
        grid-template-columns: 1.2fr auto auto;
        align-items: center;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        letter-spacing: 0.02em;
      }

      .sub {
        margin-top: 7px;
        color: var(--muted);
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
        font-size: 14px;
      }

      .mode-switch {
        display: flex;
        gap: 8px;
      }

      .mode-btn,
      .pager button,
      #toggleAnimBtn {
        border: 1px solid #b0b9b0;
        background: #f4f8f4;
        color: var(--olive);
        border-radius: 999px;
        font-weight: 700;
        padding: 8px 14px;
        cursor: pointer;
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      .mode-btn.active {
        background: var(--olive);
        color: #fff;
        border-color: var(--olive);
      }

      .timer {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 12px;
        background: #fff;
        color: var(--red);
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
        font-weight: 700;
      }

      .summary-row {
        padding: 10px 20px;
        display: flex;
        gap: 8px;
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
      }

      .chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #fff;
        padding: 5px 12px;
        font-size: 13px;
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      .layout {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 0;
      }

      .panel {
        padding: 14px;
      }

      .panel + .panel {
        border-left: 1px solid var(--line);
        background: #faf8f2;
      }

      #teacherHint {
        border: 1px dashed #c2b59b;
        background: #fff8ec;
        border-radius: 10px;
        padding: 8px 10px;
        margin-bottom: 10px;
        color: #7c6040;
        font-size: 13px;
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      .question-list {
        display: grid;
        gap: 10px;
      }

      .question-card {
        border: 1px solid #d9d0bf;
        border-radius: 12px;
        background: #fffefb;
        padding: 12px;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
      }

      .qid {
        font-weight: 800;
        color: var(--olive);
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      .chapter {
        font-size: 12px;
        color: var(--muted);
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      .stem-text {
        margin: 8px 0;
        line-height: 1.65;
        font-size: 16px;
      }

      .stem-image {
        border: 1px solid #d6d6cc;
        border-radius: 10px;
        background: #f8faf6;
        padding: 8px;
      }

      .stem-svg {
        width: 100%;
      }

      .stem-board {
        fill: #fcfff9;
        stroke: #becfbe;
        stroke-width: 1.4;
      }

      .stem-wire,
      .stem-switch,
      .stem-resistor,
      .stem-lamp-cross,
      .stem-battery-short,
      .stem-battery-long {
        stroke: #446a55;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .stem-wire,
      .stem-switch,
      .stem-battery-short,
      .stem-battery-long {
        stroke-width: 3.2;
      }

      .stem-resistor,
      .stem-lamp-cross {
        stroke-width: 2.3;
      }

      .stem-lamp {
        fill: #f7f4df;
        stroke: #446a55;
        stroke-width: 2.8;
      }

      .stem-label {
        fill: #3d5d4b;
        font-size: 12px;
        font-weight: 700;
      }

      .options-group {
        margin-top: 9px;
        display: grid;
        gap: 6px;
      }

      .option-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      .option-key {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--olive-soft);
        display: grid;
        place-items: center;
        font-size: 11px;
        color: #335142;
        font-weight: 800;
      }

      .option-text {
        font-size: 14px;
      }

      .pager {
        margin-top: 11px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .score {
        margin-left: auto;
        color: #2f6f4c;
        opacity: 0;
        font-size: 14px;
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      .score.score-visible {
        opacity: 1;
      }

      .analysis-title {
        margin: 0;
        font-size: 25px;
      }

      .analysis-sub {
        margin: 7px 0 10px;
        color: var(--muted);
        font-size: 14px;
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      .analysis-stage {
        border: 1px solid #d7d2c6;
        border-radius: 12px;
        background: #ffffff;
        padding: 10px;
      }

      .analysis-svg {
        width: 100%;
      }

      .a-wire,
      .a-switch {
        stroke: #476a56;
        stroke-width: 3;
        fill: none;
        stroke-linecap: round;
      }

      .a-node {
        fill: #476a56;
      }

      .a-lamp {
        fill: #ece8df;
        stroke: #476a56;
        stroke-width: 2.4;
      }

      .a-lamp.lamp-on {
        fill: #f3dd80;
        filter: drop-shadow(0 0 7px rgba(201, 146, 67, 0.65));
      }

      .a-flow {
        stroke: #a45140;
        stroke-width: 2.3;
        fill: none;
        stroke-dasharray: 6 5;
        opacity: 0.25;
      }

      .a-flow.flow-on {
        opacity: 1;
        animation: flowDash 1.1s linear infinite;
      }

      @keyframes flowDash {
        to {
          stroke-dashoffset: -23;
        }
      }

      .analysis-controls {
        margin-top: 10px;
        display: none;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        font-family: 'Hiragino Sans GB', 'PingFang SC', sans-serif;
      }

      @media (max-width: 980px) {
        body {
          padding: 10px;
        }

        .mast {
          grid-template-columns: 1fr;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .panel + .panel {
          border-left: none;
          border-top: 1px solid var(--line);
        }

        .score {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <header class="mast">
        <div>
          <h1>电子电工高考题库 · Demo V3</h1>
          <p class="sub">讲义编辑版：温和纸感、信息密度均衡、适合课堂投屏与讲解。</p>
        </div>
        <div class="mode-switch">
          <button id="modeStudentBtn" class="mode-btn active">学生端</button>
          <button id="modeTeacherBtn" class="mode-btn">教师端</button>
        </div>
        <div class="timer">倒计时：<span id="timerLabel">00:45:00</span></div>
      </header>

      <div class="summary-row">
        <span id="summaryLabel" class="chip">载入中...</span>
        <span id="modeLabel" class="chip">学生模式</span>
        <span id="pageInfo" class="chip">第 1 / 10 页</span>
      </div>

      <main class="layout">
        <section class="panel">
          <div id="teacherHint" hidden>教师模式：录题、发布、校验入口（demo占位）。</div>
          <div id="questionList" class="question-list"></div>
          <div class="pager">
            <button id="prevBtn">上一页</button>
            <button id="nextBtn">下一页</button>
            <button id="submitPageBtn">提交本页</button>
            <span id="scoreLabel" class="score">本页得分：0/4</span>
          </div>
        </section>

        <aside class="panel">
          <h2 class="analysis-title">解析演示</h2>
          <p class="analysis-sub">这里承载“亮灯/电流/开关”可交互演示，题干区保持静态。</p>

          <div class="analysis-stage">
            <svg class="analysis-svg" viewBox="0 0 220 140" aria-label="解析动画电路图">
              <defs>
                <marker id="flowArrowV3" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
                  <polygon points="0,0 10,4 0,8" fill="#a45140" />
                </marker>
              </defs>
              <line x1="22" y1="50" x2="80" y2="50" class="a-wire" />
              <line x1="118" y1="50" x2="154" y2="50" class="a-wire" />
              <line x1="154" y1="50" x2="178" y2="50" class="a-wire" />
              <line x1="178" y1="50" x2="178" y2="108" class="a-wire" />
              <line x1="178" y1="108" x2="22" y2="108" class="a-wire" />
              <line x1="22" y1="108" x2="22" y2="50" class="a-wire" />

              <line id="analysisSwitchBlade" x1="80" y1="50" x2="118" y2="50" class="a-switch" />
              <circle cx="80" cy="50" r="3.6" class="a-node" />
              <circle cx="118" cy="50" r="3.6" class="a-node" />

              <circle id="analysisLamp" cx="178" cy="92" r="16" class="a-lamp lamp-on" />
              <line x1="166" y1="80" x2="190" y2="104" class="a-switch" />
              <line x1="190" y1="80" x2="166" y2="104" class="a-switch" />

              <path id="analysisFlow" class="a-flow flow-on" d="M 24 64 C 64 18, 138 18, 176 64" marker-end="url(#flowArrowV3)" />
              <text x="100" y="18" fill="#a45140" font-size="12" font-weight="700">电流方向 I</text>
            </svg>
          </div>

          <div class="analysis-controls">
            <button id="toggleAnimBtn">切换开关状态</button>
            <strong id="switchStateLabel">开关状态：闭合</strong>
          </div>
        </aside>
      </main>
    </div>

    <script src="./assets/quiz-engine.js"></script>
    <script src="./assets/question-bank-40.js"></script>
    <script src="./assets/demo-shell.js"></script>
    <script>
      DemoShell.init({ themeName: 'V3 讲义编辑版' });
    </script>
  </body>
</html>
